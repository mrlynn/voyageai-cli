name: Release Desktop App

# Triggers on version tags like v1.33.0
# macOS is built and published LOCALLY (requires Apple signing cert)
# Linux + Windows are built here in CI
on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: cd electron && npm ci
      - name: Build + publish Linux
        run: cd electron && npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: cd electron && npm ci
      - name: Build + publish Windows
        run: cd electron && npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
